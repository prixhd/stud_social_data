<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Список студентов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* Единая цветовая схема - синий */
        .btn-primary {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
            border-color: #0a58ca;
        }
        .table-primary {
            background-color: #cfe2ff;
        }

        /* БЕЙДЖИ СТАТУСОВ */
        .badge-active {
            background-color: #0d6efd;
            color: white;
            font-size: 0.75rem;
            padding: 0.35em 0.65em;
        }
        .badge-expiring {
            background-color: #6c757d;
            color: white;
            font-size: 0.75rem;
            padding: 0.35em 0.65em;
        }
        .badge-expired {
            background-color: #dc3545;
            color: white;
            font-size: 0.75rem;
            padding: 0.35em 0.65em;
        }
        .badge-permanent {
            background-color: #198754;
            color: white;
            font-size: 0.75rem;
            padding: 0.35em 0.65em;
        }

        /* ВКЛАДКИ */
        .nav-tabs .nav-link {
            color: #495057;
        }
        .nav-tabs .nav-link.active {
            background-color: #0d6efd;
            color: white;
            border-color: #0d6efd;
        }
        .nav-tabs .nav-link:hover {
            border-color: #dee2e6 #dee2e6 #fff;
        }

        /* СТРОКИ ТАБЛИЦЫ */
        .expiring-row {
            background-color: #f8f9fa;
        }

        /* ФИЛЬТРЫ */
        .card-header .btn-link {
            color: #0d6efd;
            font-weight: 500;
        }
        .card-header .btn-link:hover {
            color: #0b5ed7;
        }
    </style>
</head>
<body>

<div th:insert="~{blocks/header :: header}"></div>

<div class="container mt-4">

    <!-- ЗАГОЛОВОК -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 th:text="${title}">Список студентов</h1>
        <a th:href="@{/students/add}" class="btn btn-primary">Добавить студента</a>
    </div>

    <!-- ВКЛАДКИ -->
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link"
               th:classappend="${activeTab == null || activeTab == 'active'} ? 'active' : ''"
               th:href="@{/students/show}">
                Актуальные студенты
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link"
               th:classappend="${activeTab == 'expiring'} ? 'active' : ''"
               th:href="@{/students/show/expiring}">
                Истекают скоро
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link"
               th:classappend="${activeTab == 'archived'} ? 'active' : ''"
               th:href="@{/students/show/archived}">
                Архив
            </a>
        </li>
    </ul>

    <!-- ПОИСК -->
    <div class="row mb-3">
        <div class="col-md-6">
            <div class="input-group">
                <input type="search" id="searchInput" class="form-control"
                       placeholder="Поиск по ФИО или номеру приказа">
                <button class="btn btn-primary" type="button" onclick="performSearch()">Поиск</button>
            </div>
        </div>
    </div>

    <!-- ФИЛЬТРЫ (СВОРАЧИВАЕМЫЕ) -->
    <div class="card mb-3">
        <div class="card-header">
            <button class="btn btn-link text-decoration-none w-100 text-start p-0"
                    data-bs-toggle="collapse"
                    data-bs-target="#filterCollapse"
                    aria-expanded="false">
                Фильтры
            </button>
        </div>
        <div id="filterCollapse" class="collapse">
            <div class="card-body">
                <form th:action="@{/students/show/filter}" method="get">

                    <!-- СКРЫТОЕ ПОЛЕ ДЛЯ ВКЛАДКИ -->
                    <input type="hidden" name="tab" th:value="${activeTab}">

                    <div class="row g-3">
                        <!-- Факультет -->
                        <div class="col-md-3">
                            <label class="form-label">Факультет</label>
                            <select class="form-select" name="faculty">
                                <option value="">Все факультеты</option>
                                <option th:each="faculty : ${faculties}"
                                        th:value="${faculty.id}"
                                        th:text="${faculty.name}"
                                        th:selected="${appliedFaculty == faculty.id.toString()}">
                                </option>
                            </select>
                        </div>

                        <!-- Стипендия -->
                        <div class="col-md-3">
                            <label class="form-label">Стипендия</label>
                            <select class="form-select" name="scholarship">
                                <option value="">Все стипендии</option>
                                <option th:each="scholarship : ${scholarships}"
                                        th:value="${scholarship.id}"
                                        th:text="${scholarship.name}"
                                        th:selected="${appliedScholarship == scholarship.id.toString()}">
                                </option>
                            </select>
                        </div>

                        <!-- Форма обучения -->
                        <div class="col-md-3">
                            <label class="form-label">Форма обучения</label>
                            <select class="form-select" name="studyForm">
                                <option value="">Все формы</option>
                                <option th:each="studyForm : ${studyForms}"
                                        th:value="${studyForm.id}"
                                        th:text="${studyForm.name}"
                                        th:selected="${appliedStudyForm == studyForm.id.toString()}">
                                </option>
                            </select>
                        </div>

                        <!-- Основание -->
                        <div class="col-md-3">
                            <label class="form-label">Основание</label>
                            <select class="form-select" name="foundation">
                                <option value="">Все основания</option>
                                <option th:each="foundation : ${foundations}"
                                        th:value="${foundation.id}"
                                        th:text="${foundation.name}"
                                        th:selected="${appliedFoundation == foundation.id.toString()}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mt-2">
                        <!-- Курс -->
                        <div class="col-md-2">
                            <label class="form-label">Курс</label>
                            <select class="form-select" name="course">
                                <option value="">Все курсы</option>
                                <option value="1" th:selected="${appliedCourse == '1'}">1 курс</option>
                                <option value="2" th:selected="${appliedCourse == '2'}">2 курс</option>
                                <option value="3" th:selected="${appliedCourse == '3'}">3 курс</option>
                                <option value="4" th:selected="${appliedCourse == '4'}">4 курс</option>
                                <option value="5" th:selected="${appliedCourse == '5'}">5 курс</option>
                                <option value="6" th:selected="${appliedCourse == '6'}">6 курс</option>
                            </select>
                        </div>

                        <!-- Сортировка -->
                        <div class="col-md-3">
                            <label class="form-label">Сортировать по</label>
                            <select class="form-select" name="sortColumn">
                                <option value="">Без сортировки</option>
                                <option value="lastName" th:selected="${appliedSortColumn == 'lastName'}">Фамилии</option>
                                <option value="faculty.name" th:selected="${appliedSortColumn == 'faculty.name'}">Факультету</option>
                                <option value="course" th:selected="${appliedSortColumn == 'course'}">Курсу</option>
                                <option value="foundationEndDate" th:selected="${appliedSortColumn == 'foundationEndDate'}">Сроку основания</option>
                            </select>
                        </div>

                        <div class="col-md-2">
                            <label class="form-label">Направление</label>
                            <select class="form-select" name="sortDirection">
                                <option value="ASC" th:selected="${appliedSortDirection == 'ASC'}">По возр.</option>
                                <option value="DESC" th:selected="${appliedSortDirection == 'DESC'}">По убыв.</option>
                            </select>
                        </div>

                        <div class="col-md-3 d-flex align-items-end gap-2">
                            <button type="submit" class="btn btn-primary">Применить</button>
                            <a th:href="@{/students/show}" class="btn btn-outline-secondary">Сброс</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- ДЕЙСТВИЯ -->
    <div class="d-flex gap-2 mb-3">
        <button type="button" class="btn btn-outline-primary" onclick="exportSelected()">
            Экспорт выбранных
        </button>
        <button type="button" class="btn btn-outline-danger" onclick="deleteSelected()">
            Удалить выбранных
        </button>
        <span class="ms-auto text-muted">
            Всего: <strong th:text="${students.size()}">0</strong>
        </span>
    </div>

    <!-- ТАБЛИЦА -->
    <div class="table-responsive">
        <table class="table table-striped table-hover table-bordered align-middle">
            <thead class="table-primary">
            <tr>
                <th width="40">
                    <input type="checkbox" id="selectAll" onclick="toggleSelectAll()">
                </th>
                <th width="50">№</th>
                <th>ФИО</th>
                <th>Факультет</th>
                <th width="80">Курс</th>
                <th width="150">Срок основания до</th>
                <th width="120">Статус</th>
                <th width="200">Действия</th>
            </tr>
            </thead>
            <tbody>
            <!-- ПУСТАЯ ТАБЛИЦА -->
            <tr th:if="${students.isEmpty()}">
                <td colspan="8" class="text-center text-muted py-4">
                    Студенты не найдены
                </td>
            </tr>

            <!-- СТРОКИ СТУДЕНТОВ -->
            <tr th:each="student, iter : ${students}"
                th:classappend="${(student.isPermanent == null || !student.isPermanent) && student.foundationEndDate != null && student.foundationEndDate.isBefore(T(java.time.LocalDate).now().plusWeeks(2)) && student.foundationEndDate.isAfter(T(java.time.LocalDate).now())} ? 'expiring-row' : ''">

                <!-- Чекбокс -->
                <td>
                    <input type="checkbox" class="student-checkbox" th:value="${student.id}">
                </td>

                <!-- Номер -->
                <td th:text="${iter.count}">1</td>

                <!-- ФИО -->
                <td>
                    <strong th:text="${student.lastName + ' ' + student.firstName + ' ' + (student.middleName != null ? student.middleName : '')}">
                        Иванов Иван Иванович
                    </strong>
                </td>

                <!-- Факультет -->
                <td th:text="${student.faculty?.name}">Физический</td>

                <!-- Курс -->
                <td class="text-center" th:text="${student.course}">2</td>

                <!-- Срок основания до -->
                <td class="text-center">
                    <small>
                        <span th:if="${student.isPermanent != null && student.isPermanent}">
                            ♾️ Бессрочно
                        </span>
                        <span th:unless="${student.isPermanent != null && student.isPermanent}"
                              th:text="${student.foundationEndDate != null ? #temporals.format(student.foundationEndDate, 'dd.MM.yyyy') : '-'}">
                            31.12.2026
                        </span>
                    </small>
                </td>

                <!-- СТАТУС ПО СРОКУ ОСНОВАНИЯ -->
                <td class="text-center">
                    <!-- БЕССРОЧНО (зелёный) -->
                    <span th:if="${student.isPermanent != null && student.isPermanent}"
                          class="badge badge-permanent">
                        Бессрочно
                    </span>

                    <!-- ИСТЁК СРОК ОСНОВАНИЯ (красный) -->
                    <span th:if="${(student.isPermanent == null || !student.isPermanent) && student.foundationEndDate != null && student.foundationEndDate.isBefore(T(java.time.LocalDate).now())}"
                          class="badge badge-expired">
                        Истёк срок
                    </span>

                    <!-- ИСТЕКАЕТ СКОРО (серый) - в течение 2 недель -->
                    <span th:if="${(student.isPermanent == null || !student.isPermanent) && student.foundationEndDate != null && student.foundationEndDate.isAfter(T(java.time.LocalDate).now()) && student.foundationEndDate.isBefore(T(java.time.LocalDate).now().plusWeeks(2))}"
                          class="badge badge-expiring">
                        Истекает
                    </span>

                    <!-- АКТИВНЫЙ (синий) - больше 2 недель -->
                    <span th:if="${(student.isPermanent == null || !student.isPermanent) && student.foundationEndDate != null && student.foundationEndDate.isAfter(T(java.time.LocalDate).now().plusWeeks(2))}"
                          class="badge badge-active">
                        Активный
                    </span>
                </td>

                <!-- Действия -->
                <td>
                    <div class="btn-group btn-group-sm" role="group">
                        <a th:href="@{/students/details/{id}(id=${student.id}, returnUrl=${returnUrl})}"
                           class="btn btn-primary">
                            Подробнее
                        </a>
                        <form th:action="@{/students/delete/{id}(id=${student.id})}"
                              method="post"
                              style="display:inline;"
                              onsubmit="return confirm('Удалить студента?')">
                            <button type="submit" class="btn btn-danger btn-sm">Удалить</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/

    // Получаем текущую вкладку из Thymeleaf
    const currentTab = /*[[${activeTab}]]*/ 'active';

    // Переключение всех чекбоксов
    function toggleSelectAll() {
        const checkboxes = document.querySelectorAll('.student-checkbox');
        const selectAll = document.getElementById('selectAll');
        checkboxes.forEach(cb => cb.checked = selectAll.checked);
    }

    // Поиск студентов
    function performSearch() {
        const searchValue = document.getElementById('searchInput').value.trim();
        if (searchValue) {
            window.location.href = `/students/show/search/${encodeURIComponent(searchValue)}?tab=${currentTab}`;
        } else {
            alert('Введите текст для поиска');
        }
    }

    // Удаление выбранных студентов
    function deleteSelected() {
        const selected = Array.from(document.querySelectorAll('.student-checkbox:checked'))
            .map(cb => cb.value);

        if (selected.length === 0) {
            alert('Выберите студентов для удаления');
            return;
        }

        if (!confirm(`Удалить ${selected.length} студентов?`)) return;

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/students/show/deleteStudents';

        selected.forEach(id => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'selectedStudents';
            input.value = id;
            form.appendChild(input);
        });

        document.body.appendChild(form);
        form.submit();
    }

    // Экспорт выбранных студентов
    function exportSelected() {
        const selected = Array.from(document.querySelectorAll('.student-checkbox:checked'))
            .map(cb => cb.value);

        if (selected.length === 0) {
            alert('Выберите студентов для экспорта');
            return;
        }

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/students/export-by-ids';

        selected.forEach(id => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'studentIds';
            input.value = id;
            form.appendChild(input);
        });

        document.body.appendChild(form);
        form.submit();
    }

    // Поиск по нажатию Enter
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            performSearch();
        }
    });

    /*]]>*/
</script>

</body>
</html>
